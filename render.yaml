services:
  - type: web
    name: my-portfolio
    runtime: node
    region: ohio
    buildCommand: npm install && cd backend && npm install && cd .. && npm run build:all
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false
      - key: WA_TEMPLATE_NAME
        sync: false
      - key: WA_BUSINESS_ACCOUNT_ID
        sync: false
